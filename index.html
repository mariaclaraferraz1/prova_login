<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Candidato - ENEM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Portal do Candidato - ENEM</h1>
    </header>

    <div class="cartao">
        <form id="loginForm" action="#" method="post">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>
            <p class="erro-campo" id="erroEmail"></p> 

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required>
            <p class="erro-campo" id="erroSenha"></p> 

            <button type="submit" class="btn-entrar">Entrar</button>

            
            <button type="button" id="btnIrParaCadastro" class="btn-entrar">Cadastrar Novo Usuário</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Portal do Candidato - ENEM. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
